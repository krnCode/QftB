version: 1

sources:
  - name: rawg
    description: "Raw data loaded from the RAWG API by the Python ETL pipeline."
    schema: public
    tables:
      - name: rawg_games
        description: "One row per game. Loaded by rawg_fetcher_games + rawg_cleaner_games."
        columns:
          - name: game_id
            description: "RAWG's unique identifier for a game."
            tests:
              - unique
              - not_null
          - name: name
            tests:
              - not_null
          - name: rating
            description: "Average RAWG user rating (0–5)."

      - name: rawg_game_details
        description: "Detailed per-game data. Loaded by rawg_fetcher_game_details + rawg_cleaner_game_details."
        columns:
          - name: game_id
            description: "FK to rawg_games.game_id."
            tests:
              - unique
              - not_null
      
      - name: rawg_tags
        description: "One row per tag. Loaded by rawg_fetcher_tags + rawg_cleaner_tags."
        columns:
          - name: tag_id
            description: "RAWG's unique identifier for a tag."
            tests:
              - unique
              - not_null
          - name: name
            tests:
              - not_null

      - name: rawg_parent_platform
        description: "One row per parent platform. Loaded by rawg_fetcher_parent_platforms + rawg_cleaner_parent_platforms."
        columns:
          - name: parent_platform_id
            description: "RAWG's unique identifier for a parent platform."
            tests:
              - unique
              - not_null
          - name: name
            description: "Name of the parent platform."
            tests:
              - not_null
          - name: platform_id
            description: "RAWG's unique identifier for a platform, nested in the platform_id column."
            tests:
              - not_null

      - name: rawg_platforms
        description: >
          "One row per platform.
          A platform is a specific console, computer, or other device that can run a game.
          Loaded by rawg_fetcher_platforms + rawg_cleaner_platforms.
          PK is platform_id.
          Joins must be done with the platform_id column."
        columns:
          - name: platform_id
            description: "RAWG's unique identifier for a platform."
            tests:
              - unique
              - not_null
          - name: name
            description: "Name of the platform."
            tests:
              - not_null